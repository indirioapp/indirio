<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        background-color: #09090b;
        color: #ffffff;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          'Open Sans',
          'Helvetica Neue',
          sans-serif;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .title {
        font-size: 18px;
        font-weight: 800;
        background: linear-gradient(to right, #818cf8, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        background-color: #4f46e5;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        text-align: center;
        transition: background-color 0.2s;
      }
      .btn:hover {
        background-color: #4338ca;
      }
      .setting-group {
        margin-top: 16px;
        border-top: 1px solid #27272a;
        padding-top: 12px;
      }
      label {
        display: block;
        font-size: 11px;
        color: #a1a1aa;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      input {
        width: 100%;
        padding: 8px;
        background-color: #18181b;
        border: 1px solid #27272a;
        border-radius: 6px;
        color: white;
        font-size: 12px;
        box-sizing: border-box;
      }
      input:focus {
        outline: none;
        border-color: #4f46e5;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title">indirio Helper</div>
    </div>
    <button id="download-btn" class="btn">Şu Anki Sayfayı İndir</button>
    <div class="setting-group">
      <label for="server-url">Sunucu Adresi</label>
      <input type="text" id="server-url" value="https://indirio.com.tr" />
    </div>
    <script src="popup.js"></script>
  </body>
</html>
